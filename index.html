<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="alternate" type="application/rss+xml" title="NexusWatch Intelligence Brief" href="/api/feed" />
    <link rel="alternate" type="application/rss+xml" title="NexusWatch CII Daily Updates" href="/rss/cii" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://api.acleddata.com" />
    <link rel="dns-prefetch" href="https://earthquake.usgs.gov" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <title>NexusWatch | Real-Time Geopolitical Intelligence Platform</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff6600" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="canonical" href="https://nexuswatch.dev" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NexusWatch — Real-Time Geopolitical Intelligence" />
    <meta
      property="og:description"
      content="45+ live data layers on a 3D globe. 86 countries scored. AI-powered daily briefs. Dark vessel detection. Cinema mode. Free."
    />
    <meta property="og:image" content="https://nexuswatch.dev/api/og" />
    <meta property="og:url" content="https://nexuswatch.dev" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NexusWatch — Real-Time Geopolitical Intelligence" />
    <meta
      name="twitter:description"
      content="45+ live data layers on a 3D globe. 86 countries scored. AI-powered daily briefs. Dark vessel detection. Cinema mode. Free."
    />
    <meta name="twitter:image" content="https://nexuswatch.dev/api/og" />
    <meta
      name="description"
      content="NexusWatch is a real-time geopolitical intelligence platform. 45+ data layers, 86-country instability scoring, AI daily briefs, dark vessel detection, and cinema mode on a 3D globe."
    />
    <!-- Critical CSS: loading overlay renders before main CSS downloads -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #ededed;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .nw-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.6s;
      }
      .nw-loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .nw-loading-logo {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        color: #ff6600;
        letter-spacing: 0.05em;
        margin-bottom: 24px;
      }
      .nw-loading-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 16px;
      }
      .nw-loading-bar {
        width: 200px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 1px;
        overflow: hidden;
      }
      .nw-loading-bar-fill {
        height: 100%;
        background: #ff6600;
        transition: width 0.4s;
        width: 0;
      }
      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
