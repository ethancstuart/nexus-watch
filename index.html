<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>dashview</title>
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: var(--color-text, #fafafa);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-bottom: 1px solid var(--color-border);
      }

      .header-title {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: -0.02em;
        color: var(--color-text);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header-clock {
        font-size: 14px;
        color: var(--color-text-muted);
      }

      .header-settings {
        position: relative;
      }

      .header-gear {
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header-gear:hover {
        background: var(--color-border);
        color: var(--color-text);
      }

      /* Settings dropdown */
      .settings-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 8px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        padding: 8px;
        min-width: 200px;
        z-index: 100;
      }

      .settings-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        color: var(--color-text);
      }

      .settings-item:hover {
        background: var(--color-border);
      }

      .settings-item input[type="checkbox"] {
        accent-color: var(--color-accent);
        width: 16px;
        height: 16px;
      }

      .settings-empty {
        padding: 8px;
        font-size: 13px;
        color: var(--color-text-muted);
      }

      /* Layout */
      .panel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
        padding: 16px;
      }

      @media (max-width: 768px) {
        .panel-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Panel card */
      .panel-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .panel-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        color: var(--color-text-muted);
      }

      .panel-toggle {
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 4px;
      }

      .panel-toggle:hover {
        background: var(--color-border);
        color: var(--color-text);
      }

      .panel-content {
        flex: 1;
        color: var(--color-text);
        font-size: 14px;
      }

      .panel-error {
        color: var(--color-text-muted);
        font-size: 12px;
      }

      /* Loading indicator */
      .panel-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 0;
      }

      .panel-loading-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--color-text-muted);
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Weather panel */
      .weather-location {
        font-size: 12px;
        color: var(--color-text-muted);
        margin-bottom: 8px;
      }

      .weather-current {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
      }

      .weather-temp {
        font-size: 48px;
        font-weight: 700;
        line-height: 1;
        color: var(--color-text);
      }

      .weather-info {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .weather-icon {
        filter: brightness(1.1);
      }

      .weather-condition {
        font-size: 13px;
        color: var(--color-text);
        margin-top: -4px;
      }

      .weather-feels {
        font-size: 13px;
        color: var(--color-text-muted);
        margin-bottom: 2px;
      }

      .weather-hilo {
        font-size: 13px;
        color: var(--color-text-muted);
        margin-bottom: 12px;
      }

      .weather-divider {
        height: 1px;
        background: var(--color-border);
        margin-bottom: 12px;
      }

      .weather-forecast {
        display: flex;
        justify-content: space-around;
      }

      .weather-forecast-day {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .weather-forecast-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--color-text-muted);
      }

      .weather-forecast-icon {
        filter: brightness(1.1);
      }

      .weather-forecast-temps {
        font-size: 12px;
        color: var(--color-text);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
