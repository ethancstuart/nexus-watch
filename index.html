<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="alternate" type="application/rss+xml" title="NexusWatch Intelligence Brief" href="/api/feed" />
    <link rel="alternate" type="application/rss+xml" title="NexusWatch CII Daily Updates" href="/rss/cii" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Critical-path resource hints. Order: preconnect first for hosts hit
         on first paint, dns-prefetch for hosts hit only after data fetches.
         Don't add hints for hosts that won't be touched on the active route —
         that wastes a TCP/TLS handshake. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- MapLibre tile basemaps — only used on /#/intel route, but preconnect
         is cheap and saves ~100ms when a user lands on root and clicks Intel. -->
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <!-- unpkg hosts maplibre-gl.css; preconnect avoids a render-blocking
         DNS+TLS round-trip on initial paint. -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://api.acleddata.com" />
    <link rel="dns-prefetch" href="https://earthquake.usgs.gov" />
    <link rel="dns-prefetch" href="https://api.gdeltproject.org" />
    <link rel="dns-prefetch" href="https://firms.modaps.eosdis.nasa.gov" />
    <!-- Marketing surfaces use Source Serif 4 for editorial typography. Mono + Inter
         load for the dashboard / Cinema / data-dense surfaces. All three families
         load via a single Google Fonts request to amortize the connection. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <!-- maplibre-gl.css is injected lazily by src/map/MapView.ts when the
         globe boots. Loading it from index.html blocks paint on every
         route for ~10KB the user only needs on /#/intel. The MapView module
         appends the <link> right before constructing the map. -->
    <noscript
      ><link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet"
    /></noscript>
    <title>NexusWatch · Real-Time Geopolitical Intelligence</title>
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#04050a" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="canonical" href="https://nexuswatch.dev/" />
    <link rel="alternate" type="application/atom+xml" title="NexusWatch Intelligence Brief (Atom)" href="/api/atom" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NexusWatch" />
    <meta property="og:title" content="NexusWatch · Real-Time Geopolitical Intelligence" />
    <meta
      property="og:description"
      content="45+ live data layers on a 3D globe. 86 countries scored. AI-powered daily briefs. Dark vessel detection. Cinema mode. Free."
    />
    <meta property="og:image" content="https://nexuswatch.dev/api/og?type=site" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://nexuswatch.dev/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nexuswatch_io" />
    <meta name="twitter:creator" content="@nexuswatch_io" />
    <meta name="twitter:title" content="NexusWatch · Real-Time Geopolitical Intelligence" />
    <meta
      name="twitter:description"
      content="45+ live data layers on a 3D globe. 86 countries scored. AI-powered daily briefs. Dark vessel detection. Cinema mode. Free."
    />
    <meta name="twitter:image" content="https://nexuswatch.dev/api/og?type=site" />
    <meta
      name="description"
      content="Open-source geopolitical intelligence platform. 45+ live data layers on a 3D globe, 86-country instability scoring, daily AI briefs, and dark vessel detection. Free."
    />

    <!-- JSON-LD: WebSite + Organization for landing -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://nexuswatch.dev/#website",
            "url": "https://nexuswatch.dev/",
            "name": "NexusWatch",
            "description": "Real-time geopolitical intelligence platform. Free.",
            "publisher": { "@id": "https://nexuswatch.dev/#org" },
            "inLanguage": "en-US",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://nexuswatch.dev/#/intel?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "Organization",
            "@id": "https://nexuswatch.dev/#org",
            "name": "NexusWatch",
            "url": "https://nexuswatch.dev/",
            "logo": "https://nexuswatch.dev/icons/icon-512.svg",
            "sameAs": [
              "https://twitter.com/nexuswatch_io",
              "https://github.com/ethancstuart/nexus-watch"
            ]
          }
        ]
      }
    </script>
    <!-- Critical CSS: loading overlay renders before main CSS downloads -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #ededed;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .nw-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.6s;
      }
      .nw-loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .nw-loading-logo {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        color: #ff6600;
        letter-spacing: 0.05em;
        margin-bottom: 24px;
      }
      .nw-loading-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 16px;
      }
      .nw-loading-bar {
        width: 200px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 1px;
        overflow: hidden;
      }
      .nw-loading-bar-fill {
        height: 100%;
        background: #ff6600;
        transition: width 0.4s;
        width: 0;
      }
      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
