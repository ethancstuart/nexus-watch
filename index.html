<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff6600" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <meta property="og:type" content="website" />

      name="twitter:description"
      content="Real-time geopolitical intelligence. Earthquakes, conflicts, markets, news, and 22+ data layers on a live map."
    />
    <meta name="twitter:image" content="https://dashpulse.app/api/og" />

      name="description"
      content="Real-time geopolitical intelligence. Earthquakes, conflicts, markets, news, and 22+ data layers on a live map. Open source, built with Claude Code."
    />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
